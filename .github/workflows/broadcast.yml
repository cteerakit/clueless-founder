name: Plunk broadcast drafts

on:
  push:
    branches: [main]
    paths:
      - 'src/content/blog/**'
      - 'scripts/broadcast.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: node scripts/broadcast.js
        env:
          PLUNK_SECRET_KEY: ${{ secrets.PLUNK_SECRET_KEY }}

      - name: Commit broadcast log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .broadcasts/log.json
          git diff --cached --quiet || (git commit -m "chore: log Plunk broadcast draft(s)" && git push)
